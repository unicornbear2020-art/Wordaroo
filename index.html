<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Wordaroo 完整離線英語字典，支援英式、美式及澳洲英語詞彙、音標與裝置發音。"
    />
    <title>Wordaroo 離線英語字典</title>
    <link rel="stylesheet" href="styles.css?v=8" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="Wordaroo 字典首頁">
        <svg class="brand-mark" aria-hidden="true" viewBox="0 0 43.243 38.919">
          <path
            d="M32.61 7.295c1.11 0 2.137.302 2.968.874 1.001.689 1.641 1.719 1.801 2.902.15 1.106-.152 2.202-.828 3.007a4.01 4.01 0 0 1-.826.71l-1.059.647.521 1.127c.745 1.61 1.122 3.299 1.122 5.019 0 3.285-1.409 6.08-4.075 8.084-2.61 1.962-6.283 3.042-10.342 3.042s-7.732-1.08-10.342-3.042c-2.666-2.004-4.075-4.799-4.075-8.084 0-1.72.378-3.409 1.122-5.019l.521-1.127-1.059-.647a4.03 4.03 0 0 1-.826-.71c-.676-.805-.978-1.9-.828-3.007.16-1.183.8-2.213 1.801-2.902.832-.572 1.858-.874 2.968-.874 1.567 0 3.078.619 3.944 1.616l.63.726.902-.332a15.16 15.16 0 0 1 5.242-.933c1.795 0 3.559.314 5.242.933l.902.332.63-.726c.866-.997 2.377-1.616 3.944-1.616Z"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="2"
          />
        </svg>
        <span>WORDAROO</span>
      </a>
      <div class="database-status" id="databaseStatus">
        <span class="status-dot" aria-hidden="true"></span>
        <span>載入離線資料庫</span>
      </div>
    </header>

    <main>
      <section class="search-section" aria-label="字典搜尋">
        <form class="search-form" id="searchForm" role="search">
          <label class="sr-only" for="wordInput">輸入英文單詞或詞組</label>
          <div class="search-box">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path
                d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="2"
              />
            </svg>
            <input
              id="wordInput"
              type="search"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              placeholder="輸入 colour、color、arvo..."
              maxlength="100"
            />
            <button type="submit">查字</button>
          </div>
          <div class="suggestions" id="suggestions" hidden></div>
        </form>

        <div class="quick-links" aria-label="快速例子">
          <span>試吓：</span>
          <button type="button" data-word="dictionary">dictionary</button>
          <button type="button" data-word="colour">colour</button>
          <button type="button" data-word="sidewalk">sidewalk</button>
          <button type="button" data-word="arvo">arvo</button>
        </div>

        <div class="scanner-actions">
          <button class="scan-button" id="scanButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path
                d="M4 7V5a1 1 0 0 1 1-1h2m10 0h2a1 1 0 0 1 1 1v2M4 17v2a1 1 0 0 0 1 1h2m10 0h2a1 1 0 0 0 1-1v-2M8 9.5h8v5H8v-5Z"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
              />
            </svg>
            Scan
          </button>
          <input id="scanInput" type="file" accept="image/*" hidden />
          <p>相機拍攝或選擇相片，文字只會在此裝置處理。</p>
        </div>
      </section>

      <section class="scanner-panel" id="scannerPanel" aria-labelledby="scannerTitle" hidden>
        <div class="scanner-heading">
          <div>
            <p class="mini-label">ON-DEVICE OCR</p>
            <h2 id="scannerTitle">相片文字掃描</h2>
          </div>
          <button class="scanner-close" id="scannerClose" type="button" aria-label="關閉文字掃描">關閉</button>
        </div>
        <div class="scanner-content">
          <img id="scanPreview" alt="待掃描相片預覽" hidden />
          <div class="scanner-results">
            <p class="scanner-status" id="scannerStatus" role="status">請拍攝或選擇一張有英文文字的相片。</p>
            <progress id="scannerProgress" max="100" value="0" hidden></progress>
            <div class="scanner-playback" id="scannerPlayback" hidden>
              <button class="scanner-play-button" id="scannerPlayButton" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path
                    d="M8 5.5v13l10-6.5L8 5.5Z"
                    fill="currentColor"
                    stroke="currentColor"
                    stroke-linejoin="round"
                    stroke-width="1.5"
                  />
                </svg>
                <span id="scannerPlayLabel">聆聽全文</span>
              </button>
              <span>短按文字：由該字開始讀　長按 1 秒：查看解釋</span>
            </div>
            <div class="detected-text" id="detectedWords" aria-label="偵測到的文字"></div>
          </div>
        </div>
      </section>

      <section class="result-shell" id="resultShell" aria-live="polite">
        <div class="welcome-card" id="welcomeCard">
          <p class="mini-label">READY</p>
          <h2>字典已準備好</h2>
        </div>

        <article class="entry-card" id="entryCard" hidden>
          <div class="entry-header">
            <div>
              <div class="region-badges" id="regionBadges"></div>
              <div class="word-line">
                <h2 id="resultWord"></h2>
                <button class="sound-button" id="soundButton" type="button" aria-label="讀出單詞">
                  <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path
                      d="M11 5 6.5 9H3v6h3.5L11 19V5Zm4.5 3.5c1.35 1.2 1.35 5.8 0 7m2.75-9.5c3.15 3.15 3.15 8.85 0 12"
                      fill="none"
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-width="1.8"
                    />
                  </svg>
                </button>
              </div>
              <p class="translation" id="resultTranslation" hidden></p>
            </div>
            <div class="pronunciations" id="pronunciations"></div>
          </div>
          <div class="meanings" id="meanings"></div>
          <div class="forms-block" id="formsBlock" hidden>
            <h3>詞形變化</h3>
            <div class="forms-list" id="formsList"></div>
          </div>
          <p class="entry-source" id="entrySource"></p>
        </article>

        <div class="not-found" id="notFound" hidden>
          <span aria-hidden="true">?</span>
          <div>
            <h2>搵唔到呢個詞</h2>
            <p id="notFoundText"></p>
          </div>
        </div>
      </section>

      <section class="settings-panel" aria-labelledby="speechTitle">
        <div class="settings-heading">
          <div>
            <p class="mini-label">PRONUNCIATION</p>
            <h2 id="speechTitle">發音設定</h2>
          </div>
          <button class="preview-button" id="voicePreviewButton" type="button">試聽 adventure</button>
        </div>

        <div class="settings-grid">
          <label class="control">
            <span>口音</span>
            <select id="accentSelect">
              <option value="en-GB">英式 English (UK)</option>
              <option value="en-US" selected>美式 English (US)</option>
              <option value="en-AU">澳洲 English (AU)</option>
            </select>
          </label>
          <label class="control control-wide">
            <span>裝置聲音</span>
            <select id="voiceSelect">
              <option value="">正在載入聲音...</option>
            </select>
          </label>
          <label class="control">
            <span>速度 <output id="rateValue">0.88</output></span>
            <input id="rateInput" type="range" min="0.7" max="1.1" step="0.01" value="0.88" />
          </label>
          <label class="control">
            <span>明亮度 <output id="pitchValue">1.12</output></span>
            <input id="pitchInput" type="range" min="0.9" max="1.25" step="0.01" value="1.12" />
          </label>
        </div>
        <p class="voice-name" id="voiceName">使用聲音：正在載入...</p>
      </section>
    </main>

    <footer>
      <span>WORDAROO</span>
      <a href="DATA-LICENSE.html">資料來源及授權</a>
    </footer>

    <script src="data/manifest.js"></script>
    <script src="data/custom/people-names.js"></script>
    <script src="data/custom/disney-characters.js"></script>
    <script src="data/custom/pixar-characters.js"></script>
    <script src="vendor/tesseract/tesseract.min.js"></script>
    <script src="app.js?v=8"></script>
  </body>
</html>
